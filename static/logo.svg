<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120" width="640" height="120">
  <defs>
    <style>
      @font-face {
        font-family: 'Fallback Mono';
        src: local('JetBrains Mono'), local('Fira Code'), local('Source Code Pro'), local('Consolas'), local('Courier New');
      }
      .logo-text {
        font-family: 'JetBrains Mono', 'Fira Code', 'Source Code Pro', 'Consolas', 'Courier New', monospace;
        font-weight: 700;
        letter-spacing: 0.08em;
      }
      .sub-text {
        font-family: 'JetBrains Mono', 'Fira Code', 'Source Code Pro', 'Consolas', 'Courier New', monospace;
        font-weight: 400;
        letter-spacing: 0.15em;
      }
    </style>
    <filter id="text-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="icon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="trunk-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E85D04"/>
      <stop offset="100%" stop-color="#FAA307"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="120" rx="8" ry="8" fill="#0d1117"/>

  <!-- === Icon (left side, 80x80 area) === -->
  <g transform="translate(20, 12) scale(0.7)">
    <!-- Disc -->
    <g filter="url(#icon-glow)">
      <circle cx="62" cy="72" r="24" fill="none" stroke="#00d4ff" stroke-width="1.8" opacity="0.8"/>
      <circle cx="62" cy="72" r="16" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>
      <circle cx="62" cy="72" r="8" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.6"/>
      <circle cx="62" cy="72" r="2.5" fill="#00d4ff" opacity="0.5"/>
    </g>
    <!-- Disc tracks -->
    <g opacity="0.12" stroke="#00d4ff" fill="none">
      <circle cx="62" cy="72" r="11.5"/>
      <circle cx="62" cy="72" r="20"/>
    </g>
    <!-- Elephant head -->
    <g filter="url(#icon-glow)">
      <circle cx="42" cy="34" r="20" fill="#E85D04"/>
      <ellipse cx="24" cy="28" rx="11" ry="16" fill="#E85D04"/>
      <ellipse cx="24" cy="28" rx="6.5" ry="10.5" fill="#0d1117" opacity="0.45"/>
    </g>
    <!-- Trunk -->
    <path d="M56 44 Q68 44 73 52 Q78 60 76 68 Q74 76 68 78"
          fill="none" stroke="url(#trunk-g)" stroke-width="6" stroke-linecap="round" filter="url(#icon-glow)"/>
    <!-- Eye -->
    <circle cx="47" cy="30" r="3.8" fill="#0d1117"/>
    <circle cx="48.2" cy="28.8" r="1.6" fill="#00d4ff"/>
    <circle cx="48.6" cy="28.4" r="0.6" fill="#fff" opacity="0.8"/>
    <!-- Tusk -->
    <path d="M54 42 L57 47 L52 45 Z" fill="#FAA307" opacity="0.7"/>
  </g>

  <!-- === Wordmark === -->
  <text x="110" y="58" class="logo-text" font-size="42" fill="#E85D04" filter="url(#text-glow)">ELEPHCINEMA</text>

  <!-- Subtle second layer for depth -->
  <text x="110" y="58" class="logo-text" font-size="42" fill="#E85D04" opacity="0.6">ELEPHCINEMA</text>

  <!-- Tagline -->
  <text x="112" y="78" class="sub-text" font-size="11" fill="#c8ccd4" opacity="0.7">AUTOMATED DISC PIPELINE</text>

  <!-- === Tri-color divider bar === -->
  <rect x="110" y="88" width="170" height="3" rx="1.5" fill="#00d4ff"/>
  <rect x="280" y="88" width="170" height="3" rx="1.5" fill="#E85D04"/>
  <rect x="450" y="88" width="120" height="3" rx="1.5" fill="#FFD000"/>

  <!-- Decorative corner accents -->
  <line x1="8" y1="8" x2="8" y2="20" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="8" y1="8" x2="20" y2="8" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="632" y1="100" x2="632" y2="112" stroke="#E85D04" stroke-width="1" opacity="0.3"/>
  <line x1="620" y1="112" x2="632" y2="112" stroke="#E85D04" stroke-width="1" opacity="0.3"/>
</svg>
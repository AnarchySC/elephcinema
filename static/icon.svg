<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="glow-orange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="disc-sheen" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trunk-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E85D04"/>
      <stop offset="100%" stop-color="#FAA307"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="128" height="128" rx="20" ry="20" fill="#0d1117"/>

  <!-- Subtle background grid lines for tech feel -->
  <g opacity="0.04" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="32" x2="128" y2="32"/>
    <line x1="0" y1="64" x2="128" y2="64"/>
    <line x1="0" y1="96" x2="128" y2="96"/>
    <line x1="32" y1="0" x2="32" y2="128"/>
    <line x1="64" y1="0" x2="64" y2="128"/>
    <line x1="96" y1="0" x2="96" y2="128"/>
  </g>

  <!-- Disc / film reel - bottom right area -->
  <g filter="url(#glow-cyan)">
    <circle cx="72" cy="82" r="28" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
    <circle cx="72" cy="82" r="20" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <circle cx="72" cy="82" r="10" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
    <circle cx="72" cy="82" r="3" fill="#00d4ff" opacity="0.5"/>
  </g>
  <!-- Disc surface sheen -->
  <circle cx="72" cy="82" r="28" fill="url(#disc-sheen)"/>
  <!-- Disc track lines -->
  <g opacity="0.15" stroke="#00d4ff" fill="none">
    <circle cx="72" cy="82" r="14"/>
    <circle cx="72" cy="82" r="17"/>
    <circle cx="72" cy="82" r="23"/>
    <circle cx="72" cy="82" r="25.5"/>
  </g>
  <!-- Film sprocket holes along disc edge -->
  <g fill="#0d1117" opacity="0.6">
    <rect x="44" y="79" width="3" height="5" rx="1"/>
    <rect x="97" y="79" width="3" height="5" rx="1"/>
    <rect x="69" y="53" width="5" height="3" rx="1"/>
    <rect x="69" y="107" width="5" height="3" rx="1"/>
  </g>

  <!-- Elephant head - upper left area -->
  <g filter="url(#glow-orange)">
    <!-- Main head shape -->
    <circle cx="50" cy="42" r="24" fill="#E85D04"/>
    <!-- Ear -->
    <ellipse cx="28" cy="36" rx="14" ry="20" fill="#E85D04"/>
    <!-- Ear inner -->
    <ellipse cx="28" cy="36" rx="8" ry="13" fill="#0d1117" opacity="0.45"/>
    <!-- Ear inner detail -->
    <ellipse cx="28" cy="36" rx="5" ry="9" fill="#E85D04" opacity="0.25"/>
  </g>

  <!-- Trunk curving down to wrap around disc -->
  <path d="M66 52 Q78 52 84 60 Q90 68 88 78 Q86 86 80 90 Q74 94 68 90"
        fill="none" stroke="url(#trunk-grad)" stroke-width="7" stroke-linecap="round" filter="url(#glow-orange)"/>

  <!-- Eye -->
  <circle cx="55" cy="38" r="4.5" fill="#0d1117"/>
  <circle cx="56.5" cy="36.5" r="2" fill="#00d4ff" filter="url(#glow-cyan)"/>
  <circle cx="57" cy="36" r="0.8" fill="#ffffff" opacity="0.8"/>

  <!-- Tusk hint -->
  <path d="M62 50 L66 56 L60 54 Z" fill="#FAA307" opacity="0.7"/>

  <!-- Small neon accent dots -->
  <circle cx="16" cy="112" r="2" fill="#E85D04" opacity="0.4"/>
  <circle cx="112" cy="16" r="2" fill="#00d4ff" opacity="0.4"/>
  <circle cx="112" cy="112" r="1.5" fill="#FFD000" opacity="0.3"/>
</svg>